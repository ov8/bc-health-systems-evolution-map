<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>BC Health Systems Evolution Map</title>

<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}

body{
  background:#f5f7fb;
  color:#1f2937;
}

.page{
  max-width:1800px;
  margin:0 auto;
  padding:24px;
}

h1{
  font-size:32px;
  margin-bottom:8px;
}

.subtitle{
  color:#6b7280;
  margin-bottom:22px;
  line-height:1.5;
}

.controls{
  display:flex;
  flex-wrap:wrap;
  gap:12px;
  margin-bottom:20px;
}

.control-box{
  background:white;
  border-radius:12px;
  padding:12px;
  border:1px solid #dbe2ea;
}

button{
  background:#2563eb;
  color:white;
  border:none;
  padding:10px 14px;
  border-radius:8px;
  cursor:pointer;
  font-weight:600;
}

button.secondary{
  background:#e5e7eb;
  color:#374151;
}

button:hover{
  opacity:.92;
}

input[type="text"]{
  padding:10px;
  border-radius:8px;
  border:1px solid #cfd8e3;
  min-width:280px;
}

.legend{
  display:flex;
  flex-wrap:wrap;
  gap:12px;
  margin-bottom:18px;
}

.legend-item{
  display:flex;
  align-items:center;
  gap:8px;
  background:white;
  border:1px solid #dbe2ea;
  padding:8px 12px;
  border-radius:999px;
  font-size:13px;
}

.legend-dot{
  width:12px;
  height:12px;
  border-radius:50%;
}

.gov-lane{
  background:#eef2f7;
  border:1px solid #d6dde7;
  border-radius:18px;
  padding:18px;
  margin-bottom:26px;
}

.gov-title{
  font-size:15px;
  font-weight:700;
  margin-bottom:14px;
  color:#374151;
}

.gov-events{
  display:flex;
  gap:14px;
  overflow-x:auto;
}

.gov-chip{
  min-width:180px;
  background:white;
  border-left:5px solid #4b5563;
  border-radius:12px;
  padding:12px;
  box-shadow:0 2px 10px rgba(0,0,0,.05);
}

.gov-chip .date{
  font-size:11px;
  color:#6b7280;
  font-weight:700;
}

.gov-chip .title{
  margin-top:4px;
  font-weight:700;
  font-size:13px;
}

.timeline{
  overflow-x:auto;
  padding-bottom:40px;
}

.timeline-grid{
  min-width:1800px;
}

.year-row{
  display:grid;
  grid-template-columns:220px repeat(33, 1fr);
  margin-bottom:8px;
}

.year-label{
  position:sticky;
  left:0;
  background:#f5f7fb;
  z-index:5;
  padding:8px;
  font-weight:700;
}

.year-cell{
  text-align:center;
  font-size:12px;
  color:#6b7280;
  padding:8px 0;
}

.ha-row{
  display:grid;
  grid-template-columns:220px repeat(33, 1fr);
  min-height:90px;
  border-bottom:1px solid #e5e7eb;
  align-items:stretch;
}

.ha-label{
  position:sticky;
  left:0;
  background:#f5f7fb;
  padding:14px;
  font-size:13px;
  font-weight:700;
  border-right:1px solid #e5e7eb;
  z-index:4;
}

.cell{
  border-right:1px solid #edf1f5;
  position:relative;
  padding:4px;
}

.event{
  border-radius:12px;
  padding:8px;
  color:white;
  font-size:11px;
  margin-bottom:6px;
  cursor:pointer;
  transition:.2s;
}

.event:hover{
  transform:translateY(-2px);
}

.event-title{
  font-weight:700;
  margin-bottom:4px;
}

.event-date{
  opacity:.9;
  font-size:10px;
}

.event-fac{
  margin-top:6px;
  opacity:.9;
  font-size:10px;
  line-height:1.4;
}

.hidden{
  display:none;
}

@media(max-width:1200px){
  .timeline-grid{
    min-width:1400px;
  }
}
</style>
</head>

<body>

<div class="page">

<h1>BC Health Systems Evolution Map</h1>

<p class="subtitle">
Interactive visualization of major clinical systems evolution, interoperability initiatives,
and digital health modernization activities across British Columbia healthcare organizations.
</p>

<div class="controls">

<div class="control-box">
<button onclick="toggleVertical()">Toggle Vertical / Horizontal</button>
</div>

<div class="control-box">
<input type="text" id="facilitySearch" placeholder="Search facilities..." onkeyup="filterFacilities()">
</div>

<div class="control-box">
<button class="secondary" onclick="toggleGov()">Toggle Governance Milestones</button>
</div>

</div>

<div class="legend" id="legend"></div>

<div id="govLane"></div>

<div class="timeline">
<div class="timeline-grid" id="timelineGrid"></div>
</div>

</div>

<script>

const YEARS = [];
for(let y=1993; y<=2025; y++){
  YEARS.push(y);
}

const HA = {
  "VCH": "#c2416c",
  "PHSA": "#a16207",
  "FHA": "#2563eb",
  "IHA": "#0f766e",
  "NHA": "#9333ea",
  "VIHA": "#4f46e5",
  "PHC": "#b91c1c"
};

const GOV_EVENTS = [
  { title:"BC FOIPPA", date:"Oct 1993", yr:1993 },
  { title:"BC Hospital Act", date:"1993", yr:1993 },
  { title:"BC PIPA Act", date:"Jan 2004", yr:2004 },
  { title:"BC E-Health Act", date:"May 2008", yr:2008 },
  { title:"Pharma Services Act", date:"May 2012", yr:2012 },
  { title:"BC GHISA Act", date:"Dec 2013", yr:2013 }
];

const EVENTS = [

{
ha:"VCH",
yr:2000,
date:"Jan 2000",
system:"SoftMed",
facilities:["VGH","Richmond Hospital","GF Strong"]
},

{
ha:"PHSA",
yr:2009,
date:"Jan 2009",
system:"CAIS",
facilities:["BC Cancer Centres"]
},

{
ha:"FHA",
yr:2014,
date:"Nov 2014",
system:"FHA Meditech",
facilities:["Surrey Memorial","Burnaby Hospital","RCH"]
},

{
ha:"IHA",
yr:2016,
date:"Jun 2016",
system:"IHA Meditech",
facilities:["Royal Inland Hospital"]
},

{
ha:"NHA",
yr:2018,
date:"Jun 2018",
system:"NHA Cerner",
facilities:["UHNBC","Prince Rupert Regional"]
},

{
ha:"VIHA",
yr:2020,
date:"Apr 2020",
system:"VIHA Cerner",
facilities:["RJH","NRGH","Victoria General"]
},

{
ha:"PHSA",
yr:2023,
date:"Jun 2023",
system:"VPP Cerner",
facilities:["BC Cancer Prince George"]
}

];

const legend = document.getElementById('legend');

Object.entries(HA).forEach(([k,v]) => {
  legend.innerHTML += `
    <div class="legend-item">
      <div class="legend-dot" style="background:${v}"></div>
      ${k}
    </div>
  `;
});

const govLane = document.getElementById('govLane');

govLane.innerHTML = `
<div class="gov-lane" id="govSection">
  <div class="gov-title">Governance / Legislative Milestones</div>
  <div class="gov-events">
    ${GOV_EVENTS.map(g => `
      <div class="gov-chip">
        <div class="date">${g.date}</div>
        <div class="title">${g.title}</div>
      </div>
    `).join('')}
  </div>
</div>
`;

const grid = document.getElementById('timelineGrid');

function buildTimeline(){

grid.innerHTML = '';

const yearRow = document.createElement('div');
yearRow.className = 'year-row';

yearRow.innerHTML = `
<div class="year-label">Health Authority</div>
`;

YEARS.forEach(y => {
  yearRow.innerHTML += `
    <div class="year-cell">${y}</div>
  `;
});

grid.appendChild(yearRow);

Object.keys(HA).forEach(ha => {

  const row = document.createElement('div');
  row.className = 'ha-row';

  row.innerHTML = `
    <div class="ha-label">${ha}</div>
  `;

  YEARS.forEach(year => {

    const cell = document.createElement('div');
    cell.className = 'cell';

    EVENTS
      .filter(e => e.ha === ha && e.yr === year)
      .forEach(ev => {

        const eventDiv = document.createElement('div');
        eventDiv.className = 'event';
        eventDiv.style.background = HA[ha];

        eventDiv.innerHTML = `
          <div class="event-title">${ev.system}</div>
          <div class="event-date">${ev.date}</div>
          <div class="event-fac">
            ${ev.facilities.join('<br>')}
          </div>
        `;

        cell.appendChild(eventDiv);

      });

    row.appendChild(cell);

  });

  grid.appendChild(row);

});

}

buildTimeline();

function filterFacilities(){

const q = document
  .getElementById('facilitySearch')
  .value
  .toLowerCase();

document.querySelectorAll('.event').forEach(ev => {

  const txt = ev.innerText.toLowerCase();

  if(txt.includes(q)){
    ev.style.display = 'block';
  } else {
    ev.style.display = 'none';
  }

});

}

function toggleGov(){

document
  .getElementById('govSection')
  .classList
  .toggle('hidden');

}

let vertical = false;

function toggleVertical(){

vertical = !vertical;

if(vertical){
  document.querySelector('.timeline-grid').style.minWidth = '100%';
} else {
  document.querySelector('.timeline-grid').style.minWidth = '1800px';
}

}

</script>

</body>
</html>
