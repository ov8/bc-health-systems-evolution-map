<!doctype html>
<html lang="en">

<meta charset="utf-8" />

<title>BC Health Systems Evolution Map</title>
<style>
:root {

}
*{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif}
.wrap{padding:18px 22px 34px;max-width:100%}
.titlebar{display:flex;align-items:flex-end;justify-content:space-between;gap:14px;margin-bottom:10px}
h1{font-size:24px;margin:0;color:#141044;letter-spacing:-.02em} .sub{font-size:12px;color:var(--muted);margin-top:4px}
.controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center;justify-content:flex-end}
button,.select,input[type="search"]{border:1px solid #ded9ea;background:#fff;border-radius:999px;padding:7px 11px;font-size:12px;color:#211a50;box-shadow:0 1px 2px rgba(0,0,0,.03)}
button.active{background:#211a50;color:#fff;border-color:#211a50} select{appearance:none} input[type="search"]{min-width:240px}
.zoom{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--muted);padding:6px 10px;border:1px solid #eeeaf6;border-radius:999px;background:#fff} .zoom input{width:108px}
.haToggles,.legend{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0 10px}
.chip,.legend .item{display:flex;align-items:center;gap:7px;padding:6px 9px;border:1px solid #eeeaf6;border-radius:999px;font-size:11px;background:#fff;cursor:pointer;user-select:none}
.chip input{accent-color:#211a50} .sw{width:10px;height:10px;border-radius:50%;display:inline-block}
.note{font-size:11px;color:var(--muted);margin-bottom:8px}
.searchResults{font-size:12px;color:var(--muted);margin:6px 0 10px;display:none} .searchResults button{margin:3px;padding:5px 8px;border-radius:8px}
.timelineShell{
  border:1px solid var(--line);
  border-radius:16px;
  background:#fff;
  box-shadow:var(--shadow);
  overflow:auto;
  position:relative;
  height:calc(100vh - 150px);
  min-height:720px;
}
.ht{position:relative;min-width:calc(var(--left) + (35 * 12 * var(--month)));}
.top{position:sticky;top:0;z-index:8;background:rgba(255,255,255,.95);backdrop-filter:blur(6px);display:grid;grid-template-columns:var(--left) 1fr;border-bottom:1px solid var(--line)}
.corner{padding:13px 14px;font-weight:800;font-size:13px;border-right:1px solid var(--line)}
.years{display:grid;grid-template-columns:repeat(35, calc(12 * var(--month)));}
.year{text-align:center;padding:7px 0 5px;font-size:11px;font-weight:800;border-left:1px solid #d9d5df;background:#f5f4f8}
.months{grid-column:2;display:grid;grid-template-columns:repeat(420,var(--month));border-top:1px solid #dedbe5}
.month{font-size:9px;text-align:center;color:#7e798c;padding:4px 0;border-left:1px solid var(--grid);background:#faf9fc}
.lane{display:grid;grid-template-columns:var(--left) 1fr;min-height:var(--laneH);border-bottom:1px solid var(--line)}
.lane.isHidden{display:none}
.laneLabel{position:sticky;left:0;z-index:5;display:flex;align-items:center;gap:10px;padding:10px 13px;border-right:1px solid var(--line);font-size:12px;font-weight:700;background:var(--laneColorLight)}
.badge{width:36px;height:36px;border-radius:12px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:11px;background:var(--laneColor)}
.laneArea{position:relative;background-image:linear-gradient(to right,var(--grid) 1px,transparent 1px);background-size:var(--month) 100%;min-height:var(--laneH);}
.event{position:absolute;top:18px;left:var(--x);transform:translateX(-6px);min-width:108px;max-width:152px;border-radius:10px;padding:6px 8px;cursor:pointer;background:var(--cLight);border:1px solid rgba(0,0,0,.04);box-shadow:0 3px 10px rgba(0,0,0,.055);transition:.15s}
.event:hover{transform:translateX(-6px) translateY(-2px);box-shadow:0 8px 18px rgba(0,0,0,.12)}
.event:before{content:'';position:absolute;left:5px;top:-13px;width:11px;height:11px;border-radius:50%;background:var(--c);border:3px solid white;box-shadow:0 0 0 1px rgba(0,0,0,.05)}
.event .date{font-size:9px;font-weight:800;color:var(--c);opacity:.78;margin-bottom:1px} .event .sys{font-size:10.5px;font-weight:800;color:var(--c);line-height:1.12} .event .meta{font-size:9px;color:#5b566a;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.event.hidden{display:none}
.verticalView{display:none;max-width:1080px;margin:0 auto;border:1px solid var(--line);border-radius:16px;background:#fff;box-shadow:var(--shadow);padding:14px 0;position:relative}
.verticalView:before{content:'';position:absolute;left:50%;top:0;bottom:0;width:2px;background:var(--line)}
.vYear{position:relative;text-align:center;margin:12px 0 8px;z-index:2} .vYear span{display:inline-block;background:#fff;border:1px solid var(--line);border-radius:999px;padding:4px 14px;font-size:12px;font-weight:800;color:var(--muted)}
.vRow{position:relative;display:grid;grid-template-columns:1fr 34px 1fr;min-height:34px;margin:5px 0} .vRow.hidden{display:none}
.vDot{width:12px;height:12px;border-radius:50%;background:var(--c);border:3px solid #fff;margin:10px auto;z-index:2;box-shadow:0 0 0 1px rgba(0,0,0,.05)}
.vCard{display:inline-block;background:var(--cLight);border-radius:10px;padding:7px 10px;max-width:365px;cursor:pointer;text-align:left}
.vLeft{text-align:right;padding-right:10px} .vRight{padding-left:10px} .vDate{font-size:10px;font-weight:800;color:var(--c);opacity:.75} .vSys{font-size:12px;font-weight:800;color:var(--c)} .vMeta{font-size:10px;color:#5b566a;margin-top:3px}
.modal{position:fixed;inset:0;background:rgba(12,10,32,.42);display:none;align-items:center;justify-content:center;z-index:99;padding:22px} .modal.open{display:flex}
.box{background:white;border-radius:18px;max-width:760px;width:min(760px,96vw);max-height:82vh;overflow:auto;box-shadow:0 22px 60px rgba(0,0,0,.25)}
.boxHead{padding:18px 20px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;gap:12px;align-items:flex-start} .boxTitle{font-size:18px;font-weight:900;margin:0;color:var(--modalC)} .boxSub{font-size:13px;color:var(--muted);margin-top:4px} .close{font-size:22px;border:none;box-shadow:none;padding:2px 8px}
.facList{padding:16px 20px 22px;columns:2;column-gap:24px} .facList li{break-inside:avoid;margin:0 0 7px;font-size:13px;color:#302b40;line-height:1.3}
.facList a{color:var(--modalC);font-weight:700;text-decoration:none}.facList a:hover{text-decoration:underline}
@media(max-width:900px){:root{--left:170px;--month:36px;--laneH:92px} .titlebar{align-items:flex-start;flex-direction:column} input[type="search"]{min-width:190px} .facList{columns:1}}

@media (max-width: 768px) {

  :root{
    --left:72px !important;
  }

  .laneLabel{
    padding:8px 6px !important;
    font-size:10px !important;
    justify-content:center;
  }

  .laneLabel span:last-child{
    display:none;
  }

  .badge{
    width:28px !important;
    height:28px !important;
    font-size:9px !important;
    border-radius:8px !important;
  }

  .corner{
    font-size:10px !important;
    padding:8px 4px !important;
    text-align:center;
  }

}


</style>

</div>

    </div>
    <ul class="facList" id="mList"></ul>
  </div>
</div>

function splitProvidence(events){
  const out=[];
  events.forEach(ev=>{

    const other=ev.facs.filter(f=>!PHC_FACILITIES.has(f));
    if(phc.length && other.length){ out.push({...ev, facs:other}); out.push({...ev, ha:"Providence Health Authority", facs:phc}); }
    else if(phc.length){ out.push({...ev, ha:"Providence Health Authority", facs:phc}); }
    else out.push(ev);
  });
  return out;
}

EVENTS = splitProvidence(EVENTS);

const ABBR = {
  "Acts / Law":"LAW",
  "Fraser Health Authority":"FHA",
  "Interior Health Authority":"IHA",
  "Northern Health Authority":"NHA",
  "Vancouver Coastal Health Authority":"VCH",
  "Providence Health Authority":"PHC",
  "Island Health Authority":"VIHA",
  "Provincial Health Services Authority":"PHSA"
};

const START=1993, END=2027;

function parseMonth(ev){
  let d=ev.date;
  if(/^\d{4}$/.test(d)) return {y:+d,m:0};
  const dt=new Date(d.replace(/(\d+)(st|nd|rd|th)/g,'$1'));
  if(!isNaN(dt)) return {y:dt.getFullYear(),m:dt.getMonth()};
  const m=d.match(/([A-Za-z]+)\s+(\d{4})/);
  if(m) return {y:+m[2],m:new Date(m[1]+' 1, 2000').getMonth()};
  return {y:ev.yr,m:0};
}

function monthIndex(ev){const p=parseMonth(ev);return (p.y-START)*12+p.m}
function xpos(ev){return monthIndex(ev)*Number(getComputedStyle(document.documentElement).getPropertyValue('--month').replace('px',''))+32}
function light(ha){return (HA[ha]||{light:'#eee'}).light}
function fill(ha){return (HA[ha]||{fill:'#777'}).fill}
function activeHAs(){return [...document.querySelectorAll('.haCheck:checked')].map(x=>x.value)}
function facLabel(f){return typeof f === 'string' ? f : f.name}
function facUrl(f){return typeof f === 'string' ? null : f.url}
function facilityText(ev){return ev.facs.map(facLabel).join(' ').toLowerCase()}

function eventPasses(ev){
  const systems=sysFilter.value;
  const q=facilitySearch.value.trim().toLowerCase();
  return activeHAs().includes(ev.ha) && (systems==='all'||ev.system===systems) && (!q || facilityText(ev).includes(q));
}

function applyFilters(){
  document.querySelectorAll('[data-event]').forEach(el=>{
    const ev=EVENTS[+el.dataset.event];
    el.classList.toggle('hidden',!eventPasses(ev));
  });
  document.querySelectorAll('.lane').forEach(l=>l.classList.toggle('isHidden',!activeHAs().includes(l.dataset.ha)));

  const q=facilitySearch.value.trim().toLowerCase();
  if(q){
    const matches=EVENTS.map((e,i)=>[e,i]).filter(([e])=>eventPasses(e));
    searchResults.style.display='block';
    searchResults.innerHTML=`Showing ${matches.length} event(s) matching “${facilitySearch.value}”. `+
      matches.slice(0,8).map(([e,i])=>`<button onclick="openModal(EVENTS[${i}])">${e.date} · ${ABBR[e.ha]} · ${e.system}</button>`).join('');
  } else {
    searchResults.style.display='none';
  }
  updateNote();
}

function updateNote(){
  const visible=EVENTS.filter(eventPasses);
  const facilityCount=visible.filter(e=>e.ha!=="Acts / Law").reduce((a,e)=>a+e.facs.length,0);
  note.textContent=`${facilityCount} facilities · ${visible.length} grouped events visible · ${activeHAs().filter(h=>h!=="Acts / Law").length} health authorities shown`;
}

function openModal(ev){
  document.documentElement.style.setProperty('--modalC',fill(ev.ha));
  if (ev.url) {
    mTitle.innerHTML = `<a href="${ev.url}" target="_blank" rel="noopener" style="color:var(--modalC);text-decoration:none">${ev.system} · ${ev.date} ↗</a>`;
  } else {
    mTitle.textContent = `${ev.system} · ${ev.date}`;
  }
  const countLabel = ev.ha==="Acts / Law" ? "public source" : `facilit${ev.facs.length===1?'y':'ies'}`;
  mSub.textContent = `${ev.ha} · ${ev.facs.length} ${countLabel}`;
  mList.innerHTML=ev.facs.map(f=>{
    const label=facLabel(f);
    const url=facUrl(f);
    return `<li>${url ? `<a href="${url}" target="_blank" rel="noopener">${label}</a>` : label}</li>`;
  }).join('');
  modal.classList.add('open');
}

function buildControls(){
  haToggles.innerHTML=ORDER.map(h=>`<label class="chip"><input class="haCheck" type="checkbox" value="${h}" checked><span class="sw" style="background:${fill(h)}"></span>${HA[h].short}</label>`).join('');
  const systems=[...new Set(EVENTS.map(e=>e.system))].sort();
  sysFilter.innerHTML+=systems.map(s=>`<option value="${s}">${s}</option>`).join('');
  const facs=[...new Set(EVENTS.flatMap(e=>e.facs.map(facLabel)))].sort();
  facilityOptions.innerHTML=facs.map(f=>`<option value="${f}"></option>`).join('');
  document.querySelectorAll('.haCheck').forEach(c=>c.onchange=applyFilters);
}

function buildHorizontal(){
  const root=document.getElementById('ht');
  let top=`<div class="top"><div class="corner">Health Authority</div><div><div class="years">`;
  for(let y=START;y<=END;y++) top+=`<div class="year">${y}</div>`;
  top+=`</div><div class="months">`;
  const mn=['J','F','M','A','M','J','J','A','S','O','N','D'];
  for(let y=START;y<=END;y++) for(let i=0;i<12;i++) top+=`<div class="month">${mn[i]}</div>`;
  top+=`</div></div></div>`;
  root.innerHTML=top;

  ORDER.forEach(ha=>{
    const evs=EVENTS.map((e,i)=>[e,i]).filter(([e])=>e.ha===ha);
    if(!evs.length) return;
    const lane=document.createElement('div');
    lane.className='lane';
    lane.dataset.ha=ha;
    lane.style.setProperty('--laneColor',fill(ha));
    lane.style.setProperty('--laneColorLight',light(ha));
    lane.innerHTML=`<div class="laneLabel"><span class="badge">${ABBR[ha]||''}</span><span>${HA[ha].short||ha}</span></div><div class="laneArea"></div>`;
    const area=lane.querySelector('.laneArea');
    const used={};

    evs.sort((a,b)=>monthIndex(a[0])-monthIndex(b[0])).forEach(([ev,i])=>{
      const bucket=monthIndex(ev);
      used[bucket]=(used[bucket]||0)+1;
      const row=(used[bucket]-1)%3;
      const card=document.createElement('div');
      card.className='event';
      card.dataset.event=i;
      card.style.setProperty('--x',xpos(ev)+'px');
      card.style.setProperty('--c',fill(ha));
      card.style.setProperty('--cLight',light(ha));
      card.style.top=(18+row*24)+'px';
      const meta = ev.ha==="Acts / Law" ? "public source" : `${ev.facs.length} facilities`;
      card.innerHTML=`<div class="date">${ev.date}</div><div class="sys">${ev.system}</div><div class="meta">${meta}</div>`;
      card.onclick=()=>openModal(ev);
      area.appendChild(card);
    });

    root.appendChild(lane);
  });
}

function buildVertical(){
  const root=document.getElementById('vertical');
  root.innerHTML='';
  let lastYear=null;

  EVENTS.map((e,i)=>[e,i]).sort((a,b)=>monthIndex(a[0])-monthIndex(b[0]) || ORDER.indexOf(a[0].ha)-ORDER.indexOf(b[0].ha)).forEach(([ev,i],idx)=>{
    const p=parseMonth(ev);
    if(p.y!==lastYear){
      lastYear=p.y;
      const y=document.createElement('div');
      y.className='vYear';
      y.innerHTML=`<span>${p.y}</span>`;
      root.appendChild(y);
    }
    const row=document.createElement('div');
    row.className='vRow';
    row.dataset.event=i;
    row.style.setProperty('--c',fill(ev.ha));
    row.style.setProperty('--cLight',light(ev.ha));
    const side=idx%2===0?'left':'right';
    const meta = ev.ha==="Acts / Law" ? "public source" : `${ev.facs.length} facilities`;
    const card=`<div class="vCard"><div class="vDate">${ev.date} · ${ABBR[ev.ha]}</div><div class="vSys">${ev.system}</div><div class="vMeta">${meta}</div></div>`;
    row.innerHTML=side==='left'?`<div class="vLeft">${card}</div><div class="vDot"></div><div></div>`:`<div></div><div class="vDot"></div><div class="vRight">${card}</div>`;
    row.onclick=()=>openModal(ev);
    root.appendChild(row);
  });
}

function rebuildPositions(){
  document.querySelectorAll('.event').forEach(el=>{
    const ev=EVENTS[+el.dataset.event];
    el.style.setProperty('--x',xpos(ev)+'px');
  });
}

buildControls();
buildHorizontal();
buildVertical();
applyFilters();

sysFilter.onchange=applyFilters;
facilitySearch.oninput=applyFilters;

zoom.oninput=()=>{
  document.documentElement.style.setProperty('--month',zoom.value+'px');
  rebuildPositions();
};

resetBtn.onclick=()=>{
  sysFilter.value='all';
  facilitySearch.value='';
  document.querySelectorAll('.haCheck').forEach(c=>c.checked=true);
  zoom.value=42;
  document.documentElement.style.setProperty('--month','42px');
  rebuildPositions();
  applyFilters();
};

hBtn.onclick=()=>{
  hBtn.classList.add('active');
  vBtn.classList.remove('active');
  horizontal.style.display='block';
  vertical.style.display='none';
};

vBtn.onclick=()=>{
  vBtn.classList.add('active');
  hBtn.classList.remove('active');
  horizontal.style.display='none';
  vertical.style.display='block';
};

function closeModal(){ modal.classList.remove('open'); }
closeBtn.addEventListener('click', closeModal);
modal.addEventListener('click', e=>{ if(e.target===modal) closeModal(); });
modalBox.addEventListener('click', e=>e.stopPropagation());
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeModal(); });
</script>
</body>
